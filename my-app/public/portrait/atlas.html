</style></head><body><main class="page"><header class="head"><div><div class="tag">PORTRAIT / NIGHT INK ATLAS / V2</div><h1>夜墨小圖志</h1><p>泛黃紙上先有山、水與留白；夜色從紙邊和山坳慢慢漫進來。像素只留給可親近的窗火與小景，不覆蓋整張山水。</p></div><div class="edition">水墨版原型 · 2026‑07‑20<br>拖曳 · 點一處燈火</div></header><section class="atlas"><canvas id="c" width="1280" height="760" aria-label="夜色水墨世界地圖"></canvas><div class="key"><span class="light"></span>此刻可見的 trace<br>暗處不是未解鎖</div><div class="caption">紙上有路，沒有任務　·　拖曳遊走，點一處地點</div></section><section id="panel" class="panel" aria-live="polite"></section><p class="foot">V2 將水墨保留為地形與紙面語言，並以暖燈作為「此刻可見」而非重要程度。這不是任何既有遊戲地圖的重製；地名、地勢與互動均為這個 portrait 的原創場景。</p></main><script>
const c=document.querySelector('#c'),g=c.getContext('2d');g.imageSmoothingEnabled=false;let dx=0,dy=0,down=false,origin={};

function fill(col){g.fillStyle=col}function mountain(points,col,edge){g.beginPath();points.forEach((p,i)=>i?g.lineTo(...p):g.moveTo(...p));g.closePath();fill(col);g.fill();if(edge){g.strokeStyle=edge;g.lineWidth=1;g.stroke()}}function rect(x,y,w,h,col){fill(col);g.fillRect(x,y,w,h)}

mountain([[0,300],[116,213],[212,300],[326,195],[439,295],[548,201],[667,303],[774,211],[897,301],[1010,202],[1118,294],[1210,207],[1280,263],[1280,376],[0,376]],'#385a5eaa','#28474f');

for(let i=0;i<330;i++){let px=(i*71)%1270,py=382+(i*101)%340;let s=1+i%3;fill(i%5?'#345b4f':'#25484a');g.beginPath();g.arc(px,py,s,0,7);g.fill()}
sites.forEach(site);g.restore()}
function site(p){let X=p.x,Y=p.y;g.save();if(p.on){g.shadowBlur=24;g.shadowColor='#efa94f';g.beginPath();g.arc(X,Y-20,27,0,7);fill('#efb35c44');g.fill()}g.shadowBlur=0;let wall=p.on?'#73523b':'#394451',roof=p.on?'#4b3540':'#293746',win=p.on?'#f1bc61':'#1b2e3d';

function pos(e){let r=c.getBoundingClientRect();return{x:(e.clientX-r.left)*c.width/r.width-dx,y:(e.clientY-r.top)*c.height/r.height-dy}}c.addEventListener('pointerdown',e=>{down=true;origin={x:e.clientX-dx,y:e.clientY-dy};c.setPointerCapture(e.pointerId)});c.addEventListener('pointermove',e=>{if(!down)return;dx=Math.max(-150,Math.min(150,e.clientX-origin.x));dy=Math.max(-70,Math.min(70,e.clientY-origin.y));draw()});c.addEventListener('pointerup',e=>{let q=pos(e);down=false;let p=sites.find(v=>Math.hypot(v.x-q.x,v.y-q.y)<46);if(p){let d=document.querySelector('#panel');d.innerHTML='<h2>'+p.name+'</h2><div class="meta">'+p.meta+'</div><div>'+p.text+'</div>';d.classList.add('show');d.scrollIntoView({behavior:'smooth',block:'nearest'})}});draw();
